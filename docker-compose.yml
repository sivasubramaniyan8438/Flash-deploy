services:
  db:
    image: postgres:15-alpine
    container_name: flashdeploy-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=flashdeploy
      - POSTGRES_USER=flashuser
      - POSTGRES_PASSWORD=flashpass123
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - flashnet
  backend:
    build: ./backend
    container_name: flashdeploy-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backend/repos:/app/repos
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - flashnet
  frontend:
    build: ./frontend
    container_name: flashdeploy-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - flashnet
networks:
  flashnet:
    driver: bridge
volumes:
  pgdata:
